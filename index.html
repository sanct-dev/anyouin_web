<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安養院 ウェブサイト方向性モックアップ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Shippori Mincho', serif;
    background: #F7F4F0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  .site-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #8e1a1a;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 22px;
    letter-spacing: 0.25em;
    font-weight: 400;
    line-height: 1.8;
    color: #1a1a18;
  }
  .desc {
    margin-top: 16px;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #6a6a68;
    line-height: 2;
  }

  .section {
    width: 100%;
    max-width: 600px;
    margin-bottom: 48px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #dedad4;
  }
  .section-num {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #8e1a1a;
  }
  .section-title {
    font-size: 15px;
    letter-spacing: 0.2em;
    font-weight: 500;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid #dedad4;
    border-radius: 4px;
    padding: 18px 28px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: #8e1a1a;
    box-shadow: 0 2px 12px rgba(142,26,26,0.08);
  }
  .card-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .card-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #8e1a1a;
    min-width: 20px;
  }
  .card-title {
    font-size: 14px;
    letter-spacing: 0.15em;
  }
  .card-tag {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #8e1a1a;
    border: 1px solid #c88;
    border-radius: 2px;
    padding: 1px 5px;
    margin-left: 8px;
    vertical-align: middle;
    opacity: 0.7;
  }
  .card-arrow {
    font-size: 18px;
    color: #8e1a1a;
    opacity: 0.5;
  }

  .card.omake {
    background: #faf9f7;
    border-style: dashed;
  }
  .card.omake .card-label {
    color: #aaa;
  }
  .card.omake .card-tag {
    color: #aaa;
    border-color: #ccc;
  }

  .wireframe-section {
    width: 100%;
    max-width: 600px;
    margin-bottom: 48px;
  }
  .wireframe-header {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #aaa;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px dashed #dedad4;
  }

  footer {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #aaa;
  }
</style>
</head>
